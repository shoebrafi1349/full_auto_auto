<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Agent Coding System — Live Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg:        #0a0b0f;
    --bg2:       #12141a;
    --bg3:       #1a1d26;
    --border:    #252836;
    --text:      #e2e4ed;
    --muted:     #6b7280;
    --accent:    #7c6af7;
    --accent2:   #4ade80;
    --warn:      #f59e0b;
    --danger:    #f87171;
    --info:      #38bdf8;
    --claude:    #d97706;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Syne', sans-serif;
    --radius:    8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--sans);
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .logo span { color: var(--accent); }

  .conn-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
  }
  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--danger);
    transition: background 0.3s;
  }
  .conn-dot.live { background: var(--accent2); animation: pulse 2s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  /* ── Main grid ── */
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr 320px;
    grid-template-rows: auto 1fr;
    height: calc(100vh - 53px);
    gap: 0;
  }

  /* ── Agent panel (left) ── */
  .agents-panel {
    grid-row: 1 / 3;
    border-right: 1px solid var(--border);
    padding: 16px;
    overflow-y: auto;
    background: var(--bg2);
  }

  .panel-title {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .agent-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 8px;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .agent-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--muted);
    transition: background 0.2s;
  }
  .agent-card.active::before  { background: var(--accent); }
  .agent-card.passed::before  { background: var(--accent2); }
  .agent-card.failed::before  { background: var(--danger); }
  .agent-card.escalated::before { background: var(--claude); }

  .agent-card.active {
    border-color: rgba(124, 106, 247, 0.3);
    box-shadow: 0 0 16px rgba(124, 106, 247, 0.08);
  }

  .agent-name {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .agent-icon { font-size: 16px; }

  .agent-status {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: var(--mono);
  }

  .agent-cost {
    font-size: 10px;
    color: var(--claude);
    margin-top: 2px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .badge-local  { background: rgba(56,189,248,0.12); color: var(--info); }
  .badge-claude { background: rgba(217,119,6,0.15);  color: var(--claude); }
  .badge-free   { background: rgba(74,222,128,0.10); color: var(--accent2); }

  /* ── Stats bar (top center) ── */
  .stats-bar {
    display: flex;
    gap: 2px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }

  .stat {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    text-align: center;
  }
  .stat-val {
    font-family: var(--sans);
    font-size: 22px;
    font-weight: 800;
    line-height: 1;
  }
  .stat-val.green  { color: var(--accent2); }
  .stat-val.red    { color: var(--danger); }
  .stat-val.yellow { color: var(--warn); }
  .stat-val.purple { color: var(--accent); }
  .stat-label {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── Timeline (center) ── */
  .timeline-panel {
    overflow-y: auto;
    padding: 16px 20px;
  }

  .event-row {
    display: grid;
    grid-template-columns: 70px 100px 1fr;
    gap: 8px;
    align-items: baseline;
    padding: 5px 0;
    border-bottom: 1px solid rgba(37,40,54,0.5);
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .ev-time { color: var(--muted); font-size: 11px; }
  .ev-agent {
    font-weight: 600;
    font-size: 11px;
    padding: 1px 5px;
    border-radius: 3px;
    text-align: center;
  }

  .agent-orch  { background: rgba(124,106,247,0.15); color: var(--accent); }
  .agent-plan  { background: rgba(56,189,248,0.15);  color: var(--info); }
  .agent-code  { background: rgba(74,222,128,0.12);  color: var(--accent2); }
  .agent-test  { background: rgba(245,158,11,0.12);  color: var(--warn); }
  .agent-fix   { background: rgba(248,113,113,0.12); color: var(--danger); }
  .agent-sup   { background: rgba(217,119,6,0.15);   color: var(--claude); }

  .ev-msg { font-size: 12px; color: var(--text); }
  .ev-msg.dim { color: var(--muted); }

  .ev-tag {
    display: inline-block;
    padding: 0 4px;
    border-radius: 2px;
    font-size: 10px;
    margin-left: 4px;
    vertical-align: middle;
  }
  .tag-pass    { background: rgba(74,222,128,0.15); color: var(--accent2); }
  .tag-fail    { background: rgba(248,113,113,0.15); color: var(--danger); }
  .tag-warn    { background: rgba(245,158,11,0.15);  color: var(--warn); }
  .tag-claude  { background: rgba(217,119,6,0.15);   color: var(--claude); }

  /* ── Task list (right) ── */
  .tasks-panel {
    grid-row: 1 / 3;
    border-left: 1px solid var(--border);
    padding: 16px;
    overflow-y: auto;
    background: var(--bg2);
  }

  .task-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 11px 13px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .task-card:hover { border-color: rgba(124,106,247,0.4); }
  .task-card.selected { border-color: var(--accent); }

  .task-id {
    font-size: 10px;
    color: var(--muted);
    font-family: var(--mono);
  }
  .task-text {
    font-size: 12px;
    margin-top: 3px;
    line-height: 1.4;
    word-break: break-word;
  }
  .task-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 6px;
  }
  .task-status-pill {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .pill-pending   { background: rgba(107,114,128,0.2);  color: var(--muted); }
  .pill-progress  { background: rgba(124,106,247,0.2);  color: var(--accent); }
  .pill-passed    { background: rgba(74,222,128,0.15);  color: var(--accent2); }
  .pill-failed    { background: rgba(248,113,113,0.15); color: var(--danger); }
  .pill-aborted   { background: rgba(245,158,11,0.15);  color: var(--warn); }
  .pill-escalated { background: rgba(217,119,6,0.15);   color: var(--claude); }

  .task-dur { font-size: 10px; color: var(--muted); }

  /* ── Fix loop visualiser ── */
  .fix-bar {
    display: flex;
    gap: 3px;
    margin-top: 5px;
  }
  .fix-dot {
    width: 14px; height: 14px;
    border-radius: 3px;
    background: var(--bg);
    border: 1px solid var(--border);
    font-size: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .fix-dot.ok     { background: rgba(74,222,128,0.2);  border-color: var(--accent2); color: var(--accent2); }
  .fix-dot.fail   { background: rgba(248,113,113,0.2); border-color: var(--danger);  color: var(--danger); }
  .fix-dot.active { background: rgba(124,106,247,0.2); border-color: var(--accent);  animation: pulse 1s infinite; }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }
  .empty-text { font-family: var(--sans); font-size: 13px; }

  /* ── Scrollbar styling ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">multi<span>agent</span> · live</div>
  <div class="conn-badge">
    <div class="conn-dot" id="connDot"></div>
    <span id="connLabel">connecting...</span>
  </div>
</header>

<div class="layout">

  <!-- LEFT: Agent cards -->
  <aside class="agents-panel">
    <div class="panel-title">Agents</div>
    <div id="agentCards"></div>
  </aside>

  <!-- CENTER TOP: Stats -->
  <!-- CENTER BOTTOM: Timeline -->
  <div style="display:flex; flex-direction:column; overflow:hidden;">
    <div class="stats-bar" id="statsBar">
      <div class="stat"><div class="stat-val purple" id="statTotal">0</div><div class="stat-label">Tasks</div></div>
      <div class="stat"><div class="stat-val green"  id="statPassed">0</div><div class="stat-label">Passed</div></div>
      <div class="stat"><div class="stat-val red"    id="statFailed">0</div><div class="stat-label">Failed</div></div>
      <div class="stat"><div class="stat-val yellow" id="statFixes">0</div><div class="stat-label">Fix attempts</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--claude)" id="statClaude">0</div><div class="stat-label">Claude calls</div></div>
    </div>
    <div class="timeline-panel" id="timeline">
      <div class="empty">
        <div class="empty-icon">⚡</div>
        <div class="empty-text">Waiting for agent events…</div>
        <div style="margin-top:8px; color:var(--muted); font-size:11px;">
          Run: <code style="color:var(--accent)">python main.py --task "your task"</code>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT: Task list -->
  <aside class="tasks-panel">
    <div class="panel-title">Tasks</div>
    <div id="taskList">
      <div class="empty">
        <div class="empty-icon">📋</div>
        <div class="empty-text">No tasks yet</div>
      </div>
    </div>
  </aside>

</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
const state = {
  events:  [],
  tasks:   {},   // task_id → {id, text, status, startTs, failures, fixes, escalated}
  agents:  {
    orchestrator: { name:'Orchestrator', icon:'🎯', state:'idle', msg:'',  cost:'free',  badge:'free'   },
    planner:      { name:'Planner',      icon:'📋', state:'idle', msg:'',  cost:'local', badge:'local'  },
    coder:        { name:'Coder',        icon:'⌨️',  state:'idle', msg:'',  cost:'local', badge:'local'  },
    tester:       { name:'Tester',       icon:'🧪', state:'idle', msg:'',  cost:'local', badge:'local'  },
    fixer:        { name:'Fixer',        icon:'🔧', state:'idle', msg:'',  cost:'local', badge:'local'  },
    supervisor:   { name:'Supervisor',   icon:'🔭', state:'idle', msg:'',  cost:'Claude™', badge:'claude' },
  },
  stats: { total:0, passed:0, failed:0, fixes:0, claude:0 },
  selectedTask: null,
};

// ── WebSocket ──────────────────────────────────────────────────────────────────
let ws, reconnectTimer;

function connect() {
  clearTimeout(reconnectTimer);
  ws = new WebSocket('ws://127.0.0.1:8765');

  ws.onopen = () => {
    document.getElementById('connDot').classList.add('live');
    document.getElementById('connLabel').textContent = 'live';
  };

  ws.onmessage = e => {
    try { handleEvent(JSON.parse(e.data)); }
    catch(_) {}
  };

  ws.onclose = () => {
    document.getElementById('connDot').classList.remove('live');
    document.getElementById('connLabel').textContent = 'reconnecting…';
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();
}

// ── Event handler ──────────────────────────────────────────────────────────────
function handleEvent(ev) {
  state.events.push(ev);
  updateAgent(ev);
  updateTask(ev);
  updateStats(ev);
  renderTimeline(ev);
  renderAgentCards();
  renderTaskList();
  renderStats();
}

function updateAgent(ev) {
  const a = state.agents[ev.agent];
  if (!a) return;

  const t = ev.type;
  if (t.includes('started') || t === 'plan_started' || t === 'fix_attempt') {
    a.state = 'active';
    a.msg   = ev.data?.goal || ev.data?.task || ev.data?.message || t;
  } else if (t.includes('passed') || t === 'plan_ready' || t === 'git_commit') {
    a.state = 'passed';
    a.msg   = ev.data?.message || t;
  } else if (t.includes('failed') || t === 'escalation') {
    a.state = t === 'escalation' ? 'escalated' : 'failed';
    a.msg   = ev.data?.reason || t;
  } else if (t === 'supervisor_call') {
    state.agents.supervisor.state = 'active';
    state.agents.supervisor.msg   = 'Consulting Claude…';
  } else if (t === 'supervisor_done') {
    state.agents.supervisor.state = 'passed';
    state.agents.supervisor.msg   = ev.data?.action || 'ruling issued';
    state.stats.claude++;
  }
}

function updateTask(ev) {
  const id = ev.task_id;
  if (!id) return;
  if (!state.tasks[id]) {
    state.tasks[id] = {
      id, text: ev.data?.task || '…', status: 'pending',
      startTs: ev.ts, failures: 0, fixes: 0, escalated: false,
    };
    state.stats.total++;
  }
  const t = state.tasks[id];
  const ty = ev.type;
  if (ty === 'task_submitted')  { t.text = ev.data?.task || t.text; t.status = 'in_progress'; }
  if (ty === 'task_passed')     { t.status = 'passed'; }
  if (ty === 'task_failed')     { t.status = 'failed'; t.failures++; }
  if (ty === 'task_aborted')    { t.status = 'aborted'; }
  if (ty === 'fix_attempt')     { t.fixes++; }
  if (ty === 'escalation')      { t.escalated = true; t.status = 'escalated'; }
}

function updateStats(ev) {
  const t = ev.type;
  if (t === 'task_passed')  state.stats.passed++;
  if (t === 'task_failed' || t === 'goal_failed') state.stats.failed++;
  if (t === 'fix_attempt')  state.stats.fixes++;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderAgentCards() {
  const el = document.getElementById('agentCards');
  el.innerHTML = Object.entries(state.agents).map(([key, a]) => `
    <div class="agent-card ${a.state}">
      <div class="agent-name">
        <span class="agent-icon">${a.icon}</span>
        ${a.name}
        <span class="badge badge-${a.badge}">${a.badge === 'claude' ? 'Claude' : a.cost}</span>
      </div>
      <div class="agent-status">${a.state === 'idle' ? '—' : escHtml(a.msg.slice(0, 55))}</div>
      ${a.badge === 'claude' && state.stats.claude > 0
        ? `<div class="agent-cost">API calls: ${state.stats.claude} / 5</div>` : ''}
    </div>
  `).join('');
}

const AGENT_CLASSES = {
  orchestrator: 'agent-orch',
  planner:      'agent-plan',
  coder:        'agent-code',
  tester:       'agent-test',
  fixer:        'agent-fix',
  supervisor:   'agent-sup',
};

const EVENT_ICONS = {
  task_submitted:  '→',  task_passed: '✓', task_failed: '✗', task_aborted: '⚠',
  plan_started:    '📋', plan_ready: '✓', plan_failed: '✗',
  goal_started:    '⌨',  goal_passed: '✓', goal_failed: '✗',
  file_written:    '💾',
  test_started:    '🧪', test_passed: '✓', test_failed: '✗',
  fix_attempt:     '🔧', fix_auto: '⚡', fix_llm: '🤖',
  escalation:      '🚨',
  supervisor_call: '🔭', supervisor_done: '✓',
  git_commit:      '📌', git_push: '⬆',
};

function renderTimeline(ev) {
  const container = document.getElementById('timeline');
  // Remove empty state
  const empty = container.querySelector('.empty');
  if (empty) empty.remove();

  const cls = AGENT_CLASSES[ev.agent] || 'agent-orch';
  const icon = EVENT_ICONS[ev.type] || '·';
  const ts = new Date(ev.ts * 1000).toLocaleTimeString('en', {hour12: false});

  let tag = '';
  if (ev.type.includes('passed') || ev.type === 'plan_ready' || ev.type === 'git_commit') tag = '<span class="ev-tag tag-pass">OK</span>';
  if (ev.type.includes('failed'))   tag = '<span class="ev-tag tag-fail">FAIL</span>';
  if (ev.type === 'escalation')     tag = '<span class="ev-tag tag-claude">ESCALATE</span>';
  if (ev.type === 'supervisor_call') tag = '<span class="ev-tag tag-claude">CLAUDE</span>';

  const msgText = buildMsg(ev);
  const dim = ev.type === 'git_push' || ev.type === 'session_start';

  const row = document.createElement('div');
  row.className = 'event-row';
  row.innerHTML = `
    <span class="ev-time">${ts}</span>
    <span class="ev-agent ${cls}">${icon} ${ev.agent}</span>
    <span class="ev-msg ${dim ? 'dim' : ''}">${escHtml(msgText)}${tag}</span>
  `;
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function buildMsg(ev) {
  const d = ev.data || {};
  switch (ev.type) {
    case 'task_submitted':   return `task [${ev.task_id}]: ${(d.task||'').slice(0,60)}`;
    case 'plan_ready':       return `${d.count || '?'} goal(s) planned`;
    case 'goal_started':     return `goal: ${d.goal || ev.task_id}`;
    case 'file_written':     return `wrote ${d.file || '?'} (${d.chars||0} chars)`;
    case 'test_passed':      return `${d.passed||0} passed in ${d.duration_s||0}s`;
    case 'test_failed':      return `${d.failed||0} failed — ${(d.errors||[]).slice(0,1).join('')}`;
    case 'fix_attempt':      return `fix attempt ${d.attempt||'?'}/${d.max||4}`;
    case 'fix_auto':         return `auto-fixed ${d.file||''}`;
    case 'escalation':       return `reason: ${d.reason||'unknown'}`;
    case 'supervisor_call':  return `consulting Claude (call ${d.call_n||'?'}/5)`;
    case 'supervisor_done':  return `ruling: ${d.action||'?'} — ${(d.root_cause||'').slice(0,50)}`;
    case 'git_commit':       return `committed ${(d.files||[]).join(', ')}`;
    case 'task_passed':      return `task complete ✓`;
    case 'task_failed':      return `task failed — ${d.error||''}`;
    default:                 return ev.type.replace(/_/g, ' ');
  }
}

function renderTaskList() {
  const el = document.getElementById('taskList');
  const tasks = Object.values(state.tasks).reverse();
  if (!tasks.length) return;

  el.innerHTML = tasks.map(t => {
    const dur = t.status !== 'in_progress'
      ? `${((Date.now()/1000) - t.startTs).toFixed(0)}s`
      : `${((Date.now()/1000) - t.startTs).toFixed(0)}s…`;

    const pillClass = {
      pending: 'pill-pending', in_progress: 'pill-progress',
      passed: 'pill-passed', failed: 'pill-failed',
      aborted: 'pill-aborted', escalated: 'pill-escalated',
    }[t.status] || 'pill-pending';

    const fixDots = t.fixes > 0 ? `
      <div class="fix-bar">${
        Array.from({length: Math.min(t.fixes, 4)}, (_, i) => {
          const cls = i < t.fixes - 1 ? 'fail' : (t.status === 'passed' ? 'ok' : 'active');
          return `<div class="fix-dot ${cls}">${i+1}</div>`;
        }).join('')
      }</div>` : '';

    return `
      <div class="task-card ${state.selectedTask === t.id ? 'selected' : ''}"
           onclick="selectTask('${t.id}')">
        <div class="task-id">[${t.id}]${t.escalated ? ' 🚨' : ''}</div>
        <div class="task-text">${escHtml(t.text.slice(0,100))}</div>
        ${fixDots}
        <div class="task-meta">
          <span class="task-status-pill ${pillClass}">${t.status.replace('_',' ')}</span>
          <span class="task-dur">${dur}</span>
        </div>
      </div>
    `;
  }).join('');
}

function renderStats() {
  document.getElementById('statTotal').textContent  = state.stats.total;
  document.getElementById('statPassed').textContent = state.stats.passed;
  document.getElementById('statFailed').textContent = state.stats.failed;
  document.getElementById('statFixes').textContent  = state.stats.fixes;
  document.getElementById('statClaude').textContent = state.stats.claude;
}

function selectTask(id) {
  state.selectedTask = id;
  renderTaskList();
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
renderAgentCards();
connect();
</script>
</body>
</html>
